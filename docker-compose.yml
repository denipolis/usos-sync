version: "3.9"

services:
  usos-sync:
    container_name: usos-sync
    build:
      context: .
      dockerfile: Dockerfile
    image: usos-sync:latest
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./config.json:/usr/src/app/config.json:rw
    command: ["node", "dist/main.js"]
