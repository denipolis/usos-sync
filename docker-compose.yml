version: "3.9"

services:
  usos-sync:
    container_name: usos-sync
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - NODE_OPTIONS=--max-old-space-size=128
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./config.json:/usr/src/app/config.json:rw
    mem_limit: 256m
    command: ["node", "dist/main.js"]
